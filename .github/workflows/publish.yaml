name: Publish Schema

on:
  release:
    types:
      - published

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Build site with new version
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          mkdir -p "_site/${VERSION}"
          cp json-schema/schema.json "_site/${VERSION}/"

          # Try to fetch existing versions manifest, default to empty array
          if curl -sfL https://portolan-sdi.github.io/stac-iceberg-extension/versions.json -o /tmp/versions.json 2>/dev/null; then
            # Download each existing version's schema to preserve them
            for ver in $(jq -r '.[]' /tmp/versions.json 2>/dev/null); do
              if [ "$ver" != "$VERSION" ]; then
                mkdir -p "_site/${ver}"
                curl -sfL "https://portolan-sdi.github.io/stac-iceberg-extension/${ver}/schema.json" \
                  -o "_site/${ver}/schema.json" 2>/dev/null || true
              fi
            done
            # Add new version to manifest
            jq --arg v "$VERSION" '. + [$v] | unique' /tmp/versions.json > _site/versions.json
          else
            # First deployment - create fresh manifest
            echo "[\"${VERSION}\"]" > _site/versions.json
          fi

          # Create index page listing all versions
          cat > _site/index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html>
          <head>
            <title>STAC Iceberg Extension</title>
            <style>
              body { font-family: system-ui, sans-serif; max-width: 600px; margin: 2rem auto; padding: 0 1rem; }
              h1 { color: #333; }
              ul { list-style: none; padding: 0; }
              li { margin: 0.5rem 0; }
              a { color: #0066cc; }
            </style>
          </head>
          <body>
            <h1>STAC Iceberg Extension</h1>
            <p>JSON Schema for the <a href="https://github.com/portolan-sdi/stac-iceberg-extension">STAC Iceberg Extension</a>.</p>
            <h2>Available Versions</h2>
            <ul id="versions"></ul>
            <script>
              fetch('versions.json')
                .then(r => r.json())
                .then(versions => {
                  const ul = document.getElementById('versions');
                  versions.sort().reverse().forEach(v => {
                    const li = document.createElement('li');
                    li.innerHTML = `<a href="${v}/schema.json">${v}</a>`;
                    ul.appendChild(li);
                  });
                });
            </script>
          </body>
          </html>
          HTMLEOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
